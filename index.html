<!doctype html>
<!--
  SEO Audit Verification:
  - Title: set via Helmet (SSG prerendered) ✓
  - Meta description: set via Helmet (SSG prerendered) ✓
  - Viewport: width=device-width, initial-scale=1 ✓
  - Hreflang: set via Helmet (SSG prerendered) ✓
  - Canonical: set via Helmet (SSG prerendered) ✓
  - Schema.org LocalBusiness: set via Helmet (SSG prerendered) ✓
  - noindex: NOT present ✓
  - robots.txt: Allows / ✓
-->
<html lang="es" class="bg-sc-dark min-h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#030508"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#fafafa"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=()"
    />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://tysjedvujvsmrzzrmesr.supabase.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <style>
      html {
        background-color: var(--color-bg, #030508);
        min-height: 100%;
      }
      body {
        min-height: 100%;
        margin: 0;
        font-size: 16px;
      }
    </style>

    <!-- Inline theme init (prevents FOUC, uses system preference only) -->
    <script>
      (function () {
        if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
  </head>
  <body class="bg-sc-dark min-h-full">
    <div id="root" class="min-h-full"><!--ssr-outlet--></div>
    <script defer type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
